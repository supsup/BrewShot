name: CI

# BrewShot's core is a Chrome-over-CDP harness; a runner without Chrome can only
# execute the pure-JDK unit tests and would report the end-to-end suite as
# skipped==green. This workflow installs a real Chrome and sets
# BREWSHOT_REQUIRE_CHROME so any skip becomes a failure — the suite must actually
# prove the browser path works.

on:
  push:
    branches: [main]      # gate main; PRs cover feature branches
  pull_request:
  workflow_dispatch:      # manual "Run workflow" for on-demand branch checks

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      # Turn assume-skips into hard failures: no silent "green that tested nothing".
      BREWSHOT_REQUIRE_CHROME: "1"
      # Chrome's setuid sandbox needs privileges the CI runner doesn't grant;
      # BrewShot forwards these flags to the launch (see BrewShot.launch()).
      BREWSHOT_CHROME_ARGS: "--no-sandbox"
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"

      - name: Install Google Chrome (stable) + fonts
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y fonts-liberation fonts-dejavu-core fonts-noto-core
          wget -q -O /tmp/chrome.deb https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt-get install -y /tmp/chrome.deb
          google-chrome-stable --version

      - name: Test (Chrome required — skips fail the build)
        run: ./gradlew test --no-daemon --stacktrace
